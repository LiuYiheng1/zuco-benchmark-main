smoke_test:
  epochs: 5
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  seed: 1
  hidden_dim: 32
  dropout_rate: 0.1
  held_out_subject: "YHS"
  val_fraction: 0.1

loss:
  lambda_recon: 0.05
  lambda_cross: 0.05
  lambda_align: 0.01
  alpha_eeg: 0.05

modes:
  - gaze_mlp
  - eeg_mlp
  - concat_mlp
  - echo_v0

data:
  data_dir: "data"
  aligned_file: "aligned_multimodal_y.npz"

output:
  log_dir: "results/echo_v0"
  log_file: "smoke_test_log.txt"
  metrics_file: "smoke_test_metrics.csv"
  shapes_file: "smoke_test_shapes.json"
  model_summary_file: "echo_v0_model_summary.txt"
  protocol_checklist_file: "protocol_checklist.md"